<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreativeImage App — Demo | CyberDevTechArt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Poppins',sans-serif;background:#18181b;color:#f4f4f5;margin:0;}
  .topbar{padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #27272a;}
  .topbar .brand{font-weight:700;}
  .topbar .brand span{color:#d946ef;}
  .back{font-size:14px;color:#d946ef;text-decoration:none;}
  .wrap{max-width:900px;margin:0 auto;padding:32px 20px;}
  .banner{background:linear-gradient(135deg,#7e22ce,#d946ef);border-radius:14px;padding:22px;margin-bottom:24px;}
  .banner small{opacity:.8;}
  .editor{background:#27272a;border-radius:14px;padding:20px;display:flex;gap:20px;flex-wrap:wrap;}
  .canvas-area{flex:1;min-width:280px;background:#111113;border-radius:10px;height:280px;display:flex;align-items:center;justify-content:center;color:#52525b;font-size:14px;border:1px dashed #3f3f46;}
  .tools{width:180px;display:flex;flex-direction:column;gap:10px;}
  .tools button{background:#3f3f46;border:none;color:#f4f4f5;padding:10px;border-radius:8px;text-align:left;font-size:13px;}
  .tools button i{width:20px;color:#d946ef;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Creative<span>Image</span></div>
  <a class="back" href="plantillas.html"><i class="fas fa-arrow-left me-1"></i>Volver a plantillas</a>
</div>
<div class="wrap">
  <div class="banner">
    <small>DEMO — interfaz de ejemplo</small>
    <h4 class="mt-2 mb-0">Edita y genera imágenes desde el navegador</h4>
  </div>
  <div class="editor">
    <div class="canvas-area">Arrastra una imagen aquí o crea una nueva</div>
    <div class="tools">
      <button><i class="fas fa-crop me-2"></i>Recortar</button>
      <button><i class="fas fa-sliders-h me-2"></i>Ajustar color</button>
      <button><i class="fas fa-font me-2"></i>Agregar texto</button>
      <button><i class="fas fa-magic me-2"></i>Filtros IA</button>
      <button><i class="fas fa-download me-2"></i>Exportar</button>
    </div>
  </div>
</div>
</body>
</html>
